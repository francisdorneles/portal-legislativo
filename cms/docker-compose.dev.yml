# Postgres de desenvolvimento para o Payload CMS.
# Subir:    docker compose -f docker-compose.dev.yml up -d
# Derrubar: docker compose -f docker-compose.dev.yml down
services:
  payloaddb:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: portal_legislativo
    ports:
      - "5433:5432"
    volumes:
      - payload_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  payload_pgdata:
